[build]
command = "npm run build"
functions = "netlify/functions"
publish = "dist"

[functions]
node_bundler = "esbuild"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[env.production]
  [env.production.context.production.environment]
  PVERIFY_CLIENT_ID = ""
  PVERIFY_CLIENT_SECRET = ""
