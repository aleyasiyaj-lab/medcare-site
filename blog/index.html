<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Health Blog | Medcare Telehealth</title>
  <meta name="description" content="Expert telehealth insights on GLP-1 weight loss, urgent care, and general health from the Medcare team." />
  <link rel="canonical" href="https://medcaretelehealth.org/blog/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue: #2563EB; --blue-dark: #1d4ed8; --blue-light: #eff6ff; --text: #111827; --muted: #6b7280; --border: #e5e7eb; --bg-alt: #f9fafb; }
    body { font-family: 'Inter', sans-serif; color: var(--text); background: #fff; }
    a { color: inherit; text-decoration: none; }
    nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 5%; display: flex; align-items: center; justify-content: space-between; height: 68px; }
    .nav-logo img { height: 72px; width: auto; display: block; }
    .nav-links { display: flex; align-items: center; gap: 32px; }
    .nav-links a { font-size: 0.9rem; font-weight: 500; color: var(--muted); }
    .nav-links a:hover { color: var(--blue); }
    .btn-primary { background: var(--blue) !important; color: #fff !important; padding: 11px 24px; border-radius: 8px; font-weight: 600; font-size: 0.9rem; }
    .hero { background: var(--blue-light); padding: 60px 5%; text-align: center; }
    .hero h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 12px; }
    .hero p { color: var(--muted); font-size: 1rem; }
    .blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 28px; padding: 60px 5%; max-width: 1200px; margin: 0 auto; }
    .post-card { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: all 0.2s; }
    .post-card:hover { box-shadow: 0 8px 32px rgba(37,99,235,0.1); transform: translateY(-3px); border-color: #bfdbfe; }
    .post-card-body { padding: 24px; }
    .post-tag { display: inline-block; background: var(--blue-light); color: var(--blue); font-size: 0.75rem; font-weight: 700; padding: 3px 10px; border-radius: 100px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .post-card h2 { font-size: 1.05rem; font-weight: 700; line-height: 1.4; margin-bottom: 10px; }
    .post-card p { font-size: 0.875rem; color: var(--muted); line-height: 1.6; margin-bottom: 16px; }
    .post-meta { font-size: 0.78rem; color: var(--muted); display: flex; gap: 12px; }
    .post-read-more { display: inline-flex; align-items: center; gap: 4px; color: var(--blue); font-weight: 600; font-size: 0.85rem; margin-top: 12px; }
    footer { background: #111827; color: #d1d5db; padding: 32px 5%; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; font-size: 0.82rem; margin-top: 60px; }
    footer a { color: #9ca3af; }
    footer a:hover { color: #fff; }
    #posts-container .empty { text-align: center; padding: 80px 20px; color: var(--muted); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo"><img src="../assets/logo-black.png" alt="Medcare" /></a>
  <div class="nav-links">
    <a href="/#services">Services</a>
    <a href="/#pricing">Pricing</a>
    <a href="/blog/">Blog</a>
    <a href="/#book" class="btn-primary">Book a Visit</a>
  </div>
</nav>
<div class="hero">
  <h1>Health Insights from Medcare</h1>
  <p>Evidence-based articles on weight loss, telehealth, urgent care, and more.</p>
</div>
<div class="blog-grid" id="posts-container">
  <!-- Posts injected here by SEO script -->
  <div class="empty" style="grid-column:1/-1;">
    <p style="font-size:1.1rem;font-weight:600;margin-bottom:8px;">Articles coming soon.</p>
    <p>Check back tomorrow — we publish new health insights daily.</p>
  </div>
</div>
<footer>
  <span>&copy; 2026 Medcare Telehealth</span>
  <div style="display:flex;gap:20px;">
    <a href="/#faq">FAQ</a>
    <a href="/#book">Book a Visit</a>
  </div>
</footer>
</body>
</html>
